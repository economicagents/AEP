[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
fuzz = { runs = 256 }

[profile.default.fmt]
line_length = 120

[lint]
severity = ["high", "med", "low"]
ignore = ["src/vendor/**"]

# RPC endpoints (env vars from .env). Use: forge script ... --rpc-url base_sepolia|base_mainnet
[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC}"
base_mainnet = "${BASE_MAINNET_RPC}"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
