<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#166534"/>
  <!-- Dithered plus sign using 4x4 Bayer matrix pattern -->
  <!-- Bayer 4x4: [0,8,2,10], [12,4,14,6], [3,11,1,9], [15,7,13,5] -->
  <!-- Vertical bar (x: 12-20, y: 6-26) -->
  <!-- Horizontal bar (x: 6-26, y: 12-20) -->
  <!-- Using 2x2 pixel cells, applying dither only within plus shape -->
  <!-- Vertical bar top section (y: 6-12) -->
  <rect x="12" y="6" width="2" height="2" fill="#faf8f3"/>
  <rect x="14" y="6" width="2" height="2" fill="#166534"/>
  <rect x="16" y="6" width="2" height="2" fill="#faf8f3"/>
  <rect x="18" y="6" width="2" height="2" fill="#166534"/>
  <rect x="12" y="8" width="2" height="2" fill="#166534"/>
  <rect x="14" y="8" width="2" height="2" fill="#faf8f3"/>
  <rect x="16" y="8" width="2" height="2" fill="#166534"/>
  <rect x="18" y="8" width="2" height="2" fill="#faf8f3"/>
  <rect x="12" y="10" width="2" height="2" fill="#faf8f3"/>
  <rect x="14" y="10" width="2" height="2" fill="#166534"/>
  <rect x="16" y="10" width="2" height="2" fill="#faf8f3"/>
  <rect x="18" y="10" width="2" height="2" fill="#166534"/>
  <!-- Horizontal bar left section (x: 6-12, y: 12-20) -->
  <rect x="6" y="12" width="2" height="2" fill="#faf8f3"/>
  <rect x="8" y="12" width="2" height="2" fill="#166534"/>
  <rect x="10" y="12" width="2" height="2" fill="#faf8f3"/>
  <rect x="6" y="14" width="2" height="2" fill="#166534"/>
  <rect x="8" y="14" width="2" height="2" fill="#faf8f3"/>
  <rect x="10" y="14" width="2" height="2" fill="#166534"/>
  <rect x="6" y="16" width="2" height="2" fill="#faf8f3"/>
  <rect x="8" y="16" width="2" height="2" fill="#166534"/>
  <rect x="10" y="16" width="2" height="2" fill="#faf8f3"/>
  <rect x="6" y="18" width="2" height="2" fill="#166534"/>
  <rect x="8" y="18" width="2" height="2" fill="#faf8f3"/>
  <rect x="10" y="18" width="2" height="2" fill="#166534"/>
  <!-- Center intersection (x: 12-20, y: 12-20) - already covered by vertical bar -->
  <!-- Vertical bar bottom section (y: 20-26) -->
  <rect x="12" y="20" width="2" height="2" fill="#166534"/>
  <rect x="14" y="20" width="2" height="2" fill="#faf8f3"/>
  <rect x="16" y="20" width="2" height="2" fill="#166534"/>
  <rect x="18" y="20" width="2" height="2" fill="#faf8f3"/>
  <rect x="12" y="22" width="2" height="2" fill="#faf8f3"/>
  <rect x="14" y="22" width="2" height="2" fill="#166534"/>
  <rect x="16" y="22" width="2" height="2" fill="#faf8f3"/>
  <rect x="18" y="22" width="2" height="2" fill="#166534"/>
  <rect x="12" y="24" width="2" height="2" fill="#166534"/>
  <rect x="14" y="24" width="2" height="2" fill="#faf8f3"/>
  <rect x="16" y="24" width="2" height="2" fill="#166534"/>
  <rect x="18" y="24" width="2" height="2" fill="#faf8f3"/>
  <!-- Horizontal bar right section (x: 20-26, y: 12-20) -->
  <rect x="20" y="12" width="2" height="2" fill="#166534"/>
  <rect x="22" y="12" width="2" height="2" fill="#faf8f3"/>
  <rect x="24" y="12" width="2" height="2" fill="#166534"/>
  <rect x="20" y="14" width="2" height="2" fill="#faf8f3"/>
  <rect x="22" y="14" width="2" height="2" fill="#166534"/>
  <rect x="24" y="14" width="2" height="2" fill="#faf8f3"/>
  <rect x="20" y="16" width="2" height="2" fill="#166534"/>
  <rect x="22" y="16" width="2" height="2" fill="#faf8f3"/>
  <rect x="24" y="16" width="2" height="2" fill="#166534"/>
  <rect x="20" y="18" width="2" height="2" fill="#faf8f3"/>
  <rect x="22" y="18" width="2" height="2" fill="#166534"/>
  <rect x="24" y="18" width="2" height="2" fill="#faf8f3"/>
</svg>
