# Local or EC2: PostgreSQL 16 + pgvector. Bind to localhost only.
# Usage: docker compose -f docker-compose.yml up -d
# See README.md in this directory for backups and operations.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aep-index-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aep}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-aep_index}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - aep_index_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aep} -d ${POSTGRES_DB:-aep_index}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  aep_index_pgdata:
