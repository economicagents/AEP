name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  contracts:
    name: Contracts (Foundry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Build, format, test
        working-directory: contracts
        run: |
          forge build
          forge fmt --check
          forge test -vvv

  typescript:
    name: TypeScript (pnpm)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      AEP_INDEX_DATABASE_URL: postgresql://test:test@127.0.0.1:5432/test
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run verify:npm-metadata
      - run: pnpm run build
      - run: pnpm run test:packages
      - name: ESLint (@economicagents/web)
        run: cd packages/web && pnpm exec eslint . --max-warnings 0
