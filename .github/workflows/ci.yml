name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  contracts:
    name: Contracts (Foundry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Build, format, test
        working-directory: contracts
        run: |
          forge build
          forge fmt --check
          forge test -vvv

  typescript:
    name: TypeScript (pnpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run verify:npm-metadata
      - run: pnpm run build
      - run: pnpm run test:packages
      - name: ESLint (@aep/web)
        run: cd packages/web && pnpm exec eslint . --max-warnings 0
